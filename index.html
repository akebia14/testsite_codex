<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スタバ商品ガチャ | COFFEE IMPACT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow bg-glow--one"></div>
  <div class="bg-glow bg-glow--two"></div>

  <main class="app">
    <header class="hero">
      <p class="eyebrow">TONIGHT'S DESTINY</p>
      <h1>スタバ商品ガチャ</h1>
      <p class="lead">ボタンひとつで、今日の一杯を運命決定。</p>
    </header>

    <section class="gacha-panel" aria-label="ガチャ結果">
      <p class="label">RESULT</p>

      <div id="result" class="result" aria-live="polite">スタートを押してね</div>
      <p id="subResult" class="sub-result">迷った時間を、カフェ時間に変えよう。</p>
      <button id="spinButton" class="spin-button" type="button">ガチャを引く</button>
    </section>

    <section class="list-panel" aria-label="候補商品">
      <div class="list-header">
        <h2>候補商品リスト</h2>
        <button id="resetButton" class="ghost" type="button">初期メニューに戻す</button>
      </div>
      <p class="list-note">商品名・サイズ・料金を参照して抽選します。</p>
      <ul id="dishList" class="dish-list" aria-live="polite"></ul>
    </section>
  </main>

  <div id="stage" class="stage" aria-hidden="true">
    <div id="orb" class="orb orb--blue"></div>
    <div id="whiteout" class="whiteout"></div>
  </div>

  <div id="resultPopup" class="result-popup" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="popupRank">
    <div class="result-popup__backdrop"></div>
    <div class="result-popup__card">
      <button id="popupClose" class="result-popup__close" type="button" aria-label="結果ポップアップを閉じる">×</button>
      <p class="result-popup__label">RESULT POPUP</p>
      <dl class="result-popup__grid">
        <div>
          <dt>ランク</dt>
          <dd id="popupRank">-</dd>
        </div>
        <div>
          <dt>商品名</dt>
          <dd id="popupDish">-</dd>
        </div>
        <div>
          <dt>サイズ / 料金</dt>
          <dd id="popupSizePrice">-</dd>
        </div>
        <div>
          <dt>画像(仮置き)</dt>
          <dd>
            <div id="popupImage" class="result-popup__image" aria-hidden="true"></div>
          </dd>
        </div>
        <div>
          <dt>コメント</dt>
          <dd id="popupComment">-</dd>
        </div>
      </dl>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
