<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>晩ごはんガチャ | DINNER IMPACT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow bg-glow--one"></div>
  <div class="bg-glow bg-glow--two"></div>

  <main class="app">
    <header class="hero">
      <p class="eyebrow">TONIGHT'S DESTINY</p>
      <h1>晩ごはんガチャ</h1>
      <p class="lead">ボタンひとつで、今夜のメニューを運命決定。</p>
    </header>

    <section class="gacha-panel" aria-label="ガチャ結果">
      <p class="label">RESULT</p>
      <div id="result" class="result" aria-live="polite">スタートを押してね</div>
      <p id="subResult" class="sub-result">迷った時間を、食べる時間に変えよう。</p>
      <button id="spinButton" class="spin-button" type="button">ガチャを引く</button>
    </section>

    <section class="list-panel" aria-label="候補メニュー">
      <div class="list-header">
        <h2>候補メニュー</h2>
        <button id="resetButton" class="ghost" type="button">初期メニューに戻す</button>
      </div>
      <p class="list-note">追加した候補もガチャ対象になります。</p>

      <form id="dishForm" class="dish-form">
        <input id="dishInput" type="text" maxlength="20" placeholder="例: チキン南蛮" aria-label="メニュー名" />
        <button type="submit" class="ghost">追加</button>
      </form>

      <ul id="dishList" class="dish-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
